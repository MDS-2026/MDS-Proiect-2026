spring:
  application:
    name: backend
  
  datasource:
    url: jdbc:postgresql://localhost:5432/mds_db
    username: mds_user
    password: mds_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
