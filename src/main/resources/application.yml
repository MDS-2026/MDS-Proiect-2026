spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5432/mds_db
    username: mds_user
    password: mds_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

app:
  jwt:
    secret: fairpay-super-secret-key-that-is-at-least-256-bits-long-for-hmac
    expiration-ms: 86400000

server:
  port: 8080
