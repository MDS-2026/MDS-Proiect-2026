version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mds_postgres
    environment:
      POSTGRES_USER: mds_user
      POSTGRES_PASSWORD: mds_password
      POSTGRES_DB: mds_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mds_user -d mds_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
